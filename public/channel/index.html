<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel - 454 Videos</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">▶ 454 Videos</a></div>
        <div class="nav-links">
            <a href="/search">🔍 Search</a>
            <a href="/upload" id="nav-upload" class="hidden">⬆ Upload</a>
            <div id="nav-user" class="hidden user-menu">
                <img id="nav-avatar" class="avatar-icon" src="" alt="">
                <a href="/account" class="user-badge" id="display-user"></a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    <main>
        <div class="channel-header card">
            <div style="display:flex; align-items:center; gap:20px;">
                <img id="channel-avatar" class="large-avatar" src="" alt="">
                <div>
                    <h1 id="channel-name">Loading...</h1>
                    <p style="color:var(--text-muted);"><span id="channel-subs">0</span> Subscribers</p>
                </div>
            </div>
            <button id="subscribe-btn" class="primary-btn hidden" onclick="toggleSubscribeFromChannel()"></button>
        </div>
        <h2 class="section-title">Uploads</h2>
        <div id="videos-container" class="grid-container"></div>
    </main>
    <script src="/app.js"></script>
    <script>document.addEventListener("DOMContentLoaded", () => { checkAuth(); loadChannel(); });</script>
</body>
</html>
