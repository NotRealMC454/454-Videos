<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 454 Videos</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="center-content">
    <div class="card auth-box">
        <h1 style="color:#ff0000; margin-bottom: 5px;">▶ 454 Videos</h1>
        <h2 style="margin-bottom: 25px; color:#fff;">Join the community</h2>
        <input type="text" id="username" placeholder="Username" class="auth-input">
        <input type="password" id="password" placeholder="Password" class="auth-input">
        <div class="auth-buttons">
            <button onclick="login()" class="primary-btn">Login</button>
            <button onclick="signup()" class="secondary-btn">Sign Up</button>
        </div>
        <a href="/" class="back-link">← Continue as Guest</a>
    </div>
    <script src="/app.js"></script>
</body>
</html>
