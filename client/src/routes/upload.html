<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - 454 Videos</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">▶ 454 Videos</a></div>
        <div class="nav-links">
            <a href="/search">🔍 Search</a>
            <div id="nav-user" class="hidden user-menu">
                <img id="nav-avatar" class="avatar-icon" src="" alt="">
                <a href="/account" class="user-badge" id="display-user"></a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    <main class="center-content">
        <div class="card upload-card">
            <h2>Upload a Video</h2>
            <div class="input-group">
                <label>Video Title</label>
                <input type="text" id="video-title" placeholder="Enter an eye-catching title...">
            </div>
            <div class="input-group">
                <label>Description</label>
                <textarea id="video-desc" placeholder="Tell viewers about your video..." rows="4"></textarea>
            </div>
            
            <div class="drag-drop-zone">
                <input type="file" id="video-file" accept="video/*" class="hidden-file-input">
                <label for="video-file" class="file-label">
                    <span style="font-size: 2rem;">📁</span>
                    <p>Click to select a video file</p>
                </label>
                <div id="selected-file-name" style="margin-top:10px; color:var(--accent);"></div>
            </div>

            <button onclick="uploadVideo()" class="primary-btn full-width" style="margin-top: 20px;">Publish Video</button>
            
            <div id="progress-container" class="hidden" style="margin-top: 20px;">
                <progress id="upload-progress" value="0" max="100"></progress>
                <div class="estimator-text">
                    <span id="upload-percent">0%</span>
                    <span id="upload-eta" style="font-weight: bold; color: var(--accent);">Initializing...</span>
                </div>
            </div>
        </div>
    </main>
    <script src="/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => { 
            checkAuth(); 
            if (!localStorage.getItem('currentUser')) window.location.href = "/login"; 
            document.getElementById('video-file').addEventListener('change', function() {
                if(this.files[0]) document.getElementById('selected-file-name').innerText = "Selected: " + this.files[0].name;
            });
        });
    </script>
</body>
</html>
